name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - run: pnpm run build
        env:
          ADMIN_DATABASE_URL: ${{ secrets.ADMIN_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: 传输文件到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "dist/,package.json,pnpm-lock.yaml"
          target: /var/www/xx-game-admin-service
          strip_components: 0
          rm: true

      - name: SSH 到服务器安装依赖并重启
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /var/www/xx-game-admin-service
            cat > .env << 'EOF'
            ADMIN_DATABASE_URL=${{ secrets.ADMIN_DATABASE_URL }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            DIRECT_URL=${{ secrets.DIRECT_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            EOF
            pnpm install --prod
            pm2 restart xx-game-admin-service || pm2 start dist/src/main.js --name xx-game-admin-service
